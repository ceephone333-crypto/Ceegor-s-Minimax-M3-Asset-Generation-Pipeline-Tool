<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <!-- Bug-fix #13 (2026-06-19): tighten `connect-src` to `'self'`.
     The renderer makes no direct network calls — every external
     fetch (voice list, model run, file download) goes through IPC
     to the main process, which has its own node-side access. The
     previous `https:` token let any in-renderer script open a
     socket to any HTTPS origin, which a compromised renderer
     (XSS via a future feature, malicious AI prompt, etc.) could
     exploit. img-src / media-src stay as-is (already exclude
     remote). -->
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' data: blob:; connect-src 'self'; object-src 'none'; frame-src 'none'; frame-ancestors 'none'; base-uri 'none'; form-action 'none';" />
  <title>MiniMax Assets Tool — Token Plan &amp; PAYG</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="jobs/jobs.css" />
</head>
<body>
  <header id="topbar">
      <div class="brand">MiniMax Assets Tool <span class="brand-version" id="brand-version"></span></div>
    <nav id="tabs">
      <button data-tab="image" class="tab active" data-help-topic="topbar.tabImage">Image</button>
      <button data-tab="speech" class="tab" data-help-topic="topbar.tabSpeech">Speech</button>
      <button data-tab="music" class="tab" data-help-topic="topbar.tabMusic">Music</button>
      <button data-tab="video" class="tab" data-help-topic="topbar.tabVideo">Video</button>
    </nav>
    <div id="quota" class="quota" data-help-topic="topbar.quota"><span class="quota-label">Quota:</span> <span id="quota-value">—</span> <button id="quota-refresh" class="btn-mini" title="Refresh quota (Ctrl+R)">↻</button></div>
    <div id="status" class="status" title="App status">Ready</div>
    <button id="btn-styles" class="btn-mini" title="Style Settings (Ctrl+T) — manage prompt-prefix presets" data-help-topic="topbar.styleBtn">🎨</button>
    <button id="btn-theme" class="btn-mini" title="Toggle dark/light mode (Ctrl+L)" data-help-topic="topbar.themeBtn">🌓</button>
    <button id="btn-settings" class="btn-mini" title="Settings / config (Ctrl+S)" data-help-topic="topbar.settingsBtn">⚙</button>
  </header>

  <main id="layout">
    <section id="content">
      <div id="tab-image" class="tabpanel active"></div>
      <div id="tab-speech" class="tabpanel"></div>
      <div id="tab-music" class="tabpanel"></div>
      <div id="tab-video" class="tabpanel"></div>
    </section>
    <div class="splitter splitter-v" id="splitter-sidebar" data-splitter="sidebar" title="Drag to resize the folder-browser column"></div>
    <aside id="sidebar">
      <div class="sidebar-head">
        <button id="fb-up" class="btn-mini" title="Up one level (Ctrl+U)">↑</button>
        <span id="fb-path" class="path-label" title="">—</span>
        <button id="fb-refresh" class="btn-mini" title="Refresh" data-help-topic="sidebar.refreshBtn">↻</button>
      </div>
      <div class="sidebar-toolbar">
        <input id="fb-search" type="text" placeholder="Filter…" title="Filter file browser" data-help-topic="sidebar.filter" style="flex: 1;" />
        <select id="fb-type-filter" class="fb-type-filter" title="Filter file browser by asset type"
                data-help-topic="sidebar.typeFilter">
          <!-- v1.1.11 (reported by user): asset-type filter so the user can
               hide everything except images / audio / video / text / etc.
               The value is a comma-separated list of lowercase extensions
               (no dot); the file browser filter combines this with the
               free-text search so "Images + 'foo'" works as expected. -->
          <option value="">All types</option>
          <option value="png,jpg,jpeg,webp,gif,bmp">🖼 Images</option>
          <option value="mp3,wav,flac,ogg,m4a,opus,pcm">🎵 Audio</option>
          <option value="mp4,webm,mov,mkv,avi">🎬 Video</option>
          <option value="txt,srt,json,md,lrc">📝 Text</option>
        </select>
        <select id="fb-sort" class="fb-sort" title="Sort the file browser by…"
                data-help-topic="sidebar.sort">
          <option value="name-asc">Name ↑</option>
          <option value="name-desc">Name ↓</option>
          <option value="size-desc">Size ↓</option>
          <option value="size-asc">Size ↑</option>
          <option value="mtime-desc">Newest</option>
          <option value="mtime-asc">Oldest</option>
          <option value="created-desc">Created ↓</option>
          <option value="created-asc">Created ↑</option>
          <option value="type-asc">Type</option>
        </select>
        <button id="fb-pick" class="btn-mini" title="Navigate to a folder (opens the Windows folder-selection dialog)" data-help-topic="sidebar.pickBtn">📂</button>
        <button id="fb-new" class="btn-mini" title="New folder" data-help-topic="sidebar.newFolderBtn">+ Folder</button>
        <button id="fb-open" class="btn-mini" title="Open in Explorer" data-help-topic="sidebar.openExplorerBtn">↗</button>
        <button id="fb-options" class="btn-mini" title="Folder options (columns, sort)" data-help-topic="sidebar.options">⚙ Options</button>
      </div>
      <!-- v1.1.9: bulk-action toolbar. Appears only when the
           user has ticked at least one checkbox in the file
           list. Shows a count + master checkbox + Move here /
           Delete buttons. The toolbar lives in app.js (created
           dynamically so it can be reused by other sections
           and so the index.html stays lean). -->
      <div id="fb-bulk-toolbar" class="fb-bulk-toolbar" style="display: none;">
        <label class="fb-bulk-master" title="Select / deselect all visible items">
          <input type="checkbox" id="fb-bulk-master-cb" />
          <span id="fb-bulk-count">0 selected</span>
        </label>
        <button id="fb-bulk-move" class="btn-mini" title="Move the selected items into the current folder">⤵ Move here</button>
        <button id="fb-bulk-copy" class="btn-mini" title="Copy the selected items into the current folder">⎘ Copy here</button>
        <button id="fb-bulk-trim" class="btn-mini" title="Trim the audio head/tail on the selected audio files" data-help-topic="sidebar.bulkTrim">✂ Trim</button>
        <button id="fb-bulk-delete" class="btn-mini danger" title="Delete the selected items (asks for confirmation)">🗑 Delete</button>
        <button id="fb-bulk-clear" class="btn-mini" title="Clear the selection">✕</button>
      </div>
      <ul id="fb-list" class="fb-list"></ul>
    </aside>
  </main>
  <div class="splitter splitter-h" id="splitter-logbar" data-splitter="logbar" title="Drag to resize the log / picture-preview area"></div>

  <footer id="logbar">
    <div class="logbar-pane logbar-log">
      <details open id="log-details">
        <summary>
          <span>Log</span>
          <span class="logbar-buttons">
            <!-- Phase A: jump to newest/oldest, expand/collapse all, autoscroll chip.
                 The legacy 📋 Copy / 🗑 Clear / ▲ Collapse / ? buttons stay so the
                 existing keyboard shortcuts + help bindings keep working. -->
            <button id="log-jump-newest" class="btn-mini" title="Jump to newest log row (Home)" data-help-topic="log.jumpNewest">▲ Newest</button>
            <button id="log-jump-oldest" class="btn-mini" title="Jump to oldest log row (End)" data-help-topic="log.jumpOldest">▼ Oldest</button>
            <span class="log-pane-toolbar">
              <button id="log-collapse-all" class="btn-mini" title="Collapse every row" data-help-topic="log.collapseAll">− Collapse all</button>
              <button id="log-expand-all" class="btn-mini" title="Expand every row" data-help-topic="log.expandAll">+ Expand all</button>
            </span>
            <span id="log-autoscroll-chip" class="log-autoscroll-chip on" title="Auto-scroll: jump to newest row on every new event">Auto: ON</span>
            <button id="log-copy" class="btn-mini" title="Copy selected events (Ctrl+C) or all to the clipboard" data-help-topic="log.copy">📋 Copy</button>
            <button id="log-clear" class="btn-mini" title="Clear the log" data-help-topic="log.clear">🗑 Clear</button>
            <button id="log-toggle" class="btn-mini" title="Collapse / expand the log" data-help-topic="log.toggle">▲ Collapse</button>
            <button id="log-help" class="btn-mini" title="About the log pane" data-help="The log pane shows everything the app does in real time: generation progress, mmx output, post-processing steps, errors, and the active-jobs widget for cancellable jobs. Click a row to expand its details (or collapse it). Ctrl+Click to select, Shift+Click to range-select, Ctrl+C to copy, Ctrl+A to select all. The column on the right (separated by a draggable splitter) is a picture preview for the currently selected file.">?</button>
          </span>
        </summary>
        <div id="log-jump-pill" class="log-jump-pill" title="Click to jump to the newest row">↓ 0 new</div>
        <div id="log" class="log-pane"></div>
      </details>
    </div>
    <div class="splitter splitter-v" id="splitter-log-preview" data-splitter="log-preview" title="Drag to resize the picture-preview column"></div>
    <div class="logbar-pane logbar-preview">
      <div class="preview-pane-header">
        <span>🖼 Picture preview</span>
        <button id="preview-clear" class="btn-mini" title="Clear preview" data-help-topic="preview.clear">✕</button>
      </div>
      <div class="preview-pane-content" id="fb-preview-content">
        <div class="preview-pane-empty">Click an image in the file browser to preview it here.</div>
      </div>
    </div>
  </footer>

  <!-- Modal dialogs -->
  <div id="modal-root"></div>
  <div id="toast-root"></div>

  <!-- Phase 3: Atomic-Architecture Foundation -->
  <script src="debugLog.js"></script>
  <script src="core/DomHelpers.js"></script>
  <script src="core/ToastService.js"></script>
  <script src="core/ApiClient.js"></script>
  <script src="utils/FormatUtils.js"></script>
  <script src="utils/PathBuilder.js"></script>
  <script src="utils/securityUtils.js"></script>
  <script src="utils/fileUrl.js"></script>
  <script src="utils/fbSort.js"></script>
  <script src="utils/quotaFormatter.js"></script>
  <script src="services/LogCategories.js"></script>
  <!-- Bug-fix #8 (2026-06-19): the tracked file is
       services/LogService.js (capital L). The previous lowercase
       include only worked on case-insensitive Windows; on a
       case-sensitive FS (macOS APFS case-sensitive, Linux, CI)
       the script 404'd, the entire log pane (addLogEvent, log, …)
       failed to load, and bootstrap.js's LogService.init() threw. -->
  <script src="services/LogService.js"></script>
  <!-- Phase A: multi-job runner + new log layout. Must load AFTER
       LogService so JobRunner can call into addLogEvent. Loads BEFORE
       tabs and app.js so it's wired up by the time the gen handlers
       run. -->
  <script src="jobs/JobRunner.js"></script>
  <!-- Phase B: floating "active jobs" widget. Subscribes to JobRunner
       events and renders a small list in the bottom-right of the
       content area. Pure projection of state.jobs. -->
  <script src="widgets/ActiveJobsWidget.js"></script>
  <!-- Phase C: batch summary emission helper. Called by
       batchManager.js (or any other multi-child orchestrator) when
       a batch finishes; renders the "Batch finished: 18/20 ok, 2
       failed" line in the log pane. -->
  <script src="jobs/JobSummary.js"></script>
  <!-- Phase C: on-demand archive viewer. Loaded eagerly (it's

       can open it instantly. -->
  <link rel="stylesheet" href="widgets/archiveViewer.css">
  <script src="widgets/ArchiveViewer.js"></script>
  <script src="utils/dropTarget.js"></script>
  <script src="utils/tinyUtils.js"></script>
  <script src="utils/pureFuncs.js"></script>
  <script src="utils/fbColumns.js"></script>
  <script src="utils/imageUtils.js"></script>
  <script src="specs/modelSpecs.js"></script>
  <script src="components/ParamRow.js"></script>
  <script src="tabs/imageTab.js"></script>
  <script src="tabs/speechTabVoices.js"></script>
  <script src="tabs/speechTab.js"></script>
  <script src="tabs/musicTab.js"></script>
  <script src="tabs/videoTab.js"></script>
  <script src="tabs/styleHelpers.js"></script>
  <script src="overlays/imageOverlays.js"></script>
  <script src="services/fileBrowser1.js"></script>
  <script src="services/fileBrowser2a.js"></script>
  <script src="services/fileBrowser2b.js"></script>
  <script src="components/HelpTooltip.js"></script>
  <script src="components/LastCmdTooltip.js"></script>
  <script src="components/HelpDelegation.js"></script>
  <script src="components/CropFrameDrag.js"></script>
  <!-- Bug-fix #14 (2026-06-19): wires the three [data-splitter]
       bars in the layout so dragging them resizes the panes and
       persists the size to state.layoutSettings (loaded back
       on the next launch by SplitterDrag.applyLayoutSettings). -->

  <!-- Audio-cutter modal (window.showAudioCutter). The right-click

  <script src="audioCutter.js"></script>
  <!-- Phase 3 Block 29: 24 sections extracted from app.js -->
  <script src="sections/section24_State.js"></script>
  <script src="sections/section23_Centralized_help_system.js"></script>

  <script src="sections/section15_Optional_add_ons_popup__unified_.js"></script>
  <script src="sections/section14_Form_helpers.js"></script>
  <script src="sections/section13_Image_dim_guards.js"></script>
  <script src="sections/section12_Prompt_character_counter.js"></script>

  <script src="sections/section10_Tab_intro_popups.js"></script>
  <script src="sections/section09_Style_dropdown_refresh.js"></script>
  <!-- v1.1 (lint-size split): the resilient addLog helper
       was extracted from section08 so the main file stays
       under the 500-line HARD limit. Loaded BEFORE
       section08 so window.Section08Helpers is defined

  <script src="sections/section08Helpers.js"></script>
  <script src="sections/section08_Image_pipeline__Upscale___Crop___Convert_.js"></script>
  <script src="sections/section07_Image_optimisation___compression.js"></script>
  <!-- section06_File_browser.js removed: split into services/fileBrowser1.js + fileBrowser2.js -->
  <script src="sections/section05_Context_menu_for_preview_thumbnails___overlay.js"></script>
  <script src="sections/section04_Settings.js"></script>
  <script src="sections/section03_Settings_tab_panes.js"></script>
  <!-- v1.1 (research-driven): the Advanced pipeline settings overlay
       exposed by the Image pane. Loads AFTER section03 so its

       extracted from section08 so that file stays under the lint

       existing call sites keep working. -->
  <script src="sections/section26_IsnetbgProbe.js"></script>
  <script src="sections/section02_Popups_settings.js"></script>
  <script src="sections/section01_Diagnose_dialog.js"></script>
  <script src="bootstrap.js"></script>
  <!-- Legacy: wird in den Folge-Phasen inkrementell ausgemustert -->
  <script src="tabs/batchImportHelper.js"></script>
  <script src="tabs/batchManager.js"></script>
  <script src="app.js"></script>
</body>
</html>
